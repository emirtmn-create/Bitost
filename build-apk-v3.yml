.github/workflows/build-apk-v3.yml
name: BiTost APK V3 Olustur

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gradle 8.9 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Eski proje dosyalarini temizle ve V3 paketini ac
        run: |
          ZIP_FILE="BiTost_Kasa_V3_KURULUM_FIX.zip"
          test -f "$ZIP_FILE"
          mkdir /tmp/bitost-v3
          unzip -q "$ZIP_FILE" -d /tmp/bitost-v3
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' ! -name "$ZIP_FILE" -exec rm -rf {} +
          cp -a /tmp/bitost-v3/. .

      - name: Imza anahtari olustur
        run: |
          keytool -genkeypair -v \
            -keystore bitost-release.jks \
            -storepass bitost2026 \
            -alias bitost \
            -keypass bitost2026 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=BiTost Kasa, OU=BiTost, O=BiTost, L=Mersin, ST=Mersin, C=TR"

      - name: Release APK olustur
        run: gradle clean assembleRelease --stacktrace

      - name: APK imzasini dogrula
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)
          "$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: APK dosyasini adlandir
        run: cp app/build/outputs/apk/release/app-release.apk BiTost-Kasa-V3.apk

      - name: APK dosyasini yukle
        uses: actions/upload-artifact@v4
        with:
          name: BiTost-Kasa-V3-APK
          path: BiTost-Kasa-V3.apk
          compression-level: 0
